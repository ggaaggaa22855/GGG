<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌾 Фермерская Сага - Полная версия</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a2f1a 0%, #051a0a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }

        .game-container {
            background: #2b5e2f;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,255,0.2);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            cursor: crosshair;
            background-color: #3c8c40;
        }

        .sidebar {
            background: #1e2a1c;
            border-radius: 32px;
            padding: 20px;
            width: 280px;
            color: #ffefb9;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .sidebar h3 {
            margin: 0 0 15px 0;
            text-align: center;
            color: #f5b042;
            font-size: 1.4rem;
        }

        .achievement {
            background: #2c3e2b;
            border-radius: 16px;
            padding: 10px;
            margin: 10px 0;
            font-size: 0.85rem;
        }

        .upgrade-item {
            background: #3a4a2e;
            border-radius: 12px;
            padding: 8px 12px;
            margin: 8px 0;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upgrade-item:hover {
            background: #5a7a3e;
            transform: translateX(-3px);
        }

        .upgrade-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .price-tag {
            color: #f5b042;
            font-weight: bold;
        }

        .ui-panel {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: #2c3e2b;
            padding: 12px 20px;
            border-radius: 60px;
        }

        .stats {
            display: flex;
            gap: 20px;
            background: #1e2a1c;
            padding: 6px 16px;
            border-radius: 40px;
            color: #ffefb9;
            font-weight: bold;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1.2rem;
        }

        .inventory {
            background: #4a3e28;
            padding: 5px 16px;
            border-radius: 32px;
            font-weight: bold;
        }

        .location-badge {
            background: #3a6b2f;
            padding: 5px 16px;
            border-radius: 32px;
            font-weight: bold;
        }

        button {
            background: #f5b042;
            border: none;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 3px 0 #8b5a2b;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #8b5a2b;
        }

        .controls-info {
            background: #211d10;
            padding: 5px 12px;
            border-radius: 28px;
            font-size: 0.7rem;
        }

        @media (max-width: 900px) {
            .sidebar { width: 100%; order: 2; }
            .game-wrapper { flex-direction: column; }
            .stat { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <div class="ui-panel">
            <div class="stats">
                <div class="stat"><span>💰</span> <span id="money">2000</span></div>
                <div class="stat"><span>⭐</span> <span id="level">1</span></div>
                <div class="stat"><span>🚜</span> <span id="vehicleName">Пешком</span></div>
            </div>
            <div class="inventory">
                🌾 <span id="inventoryCount">0</span> ед.
            </div>
            <div class="location-badge" id="locationDisplay">
                🌾 ФЕРМА
            </div>
            <div class="controls-info">WASD/стрелки | Пробел - техника | Enter - переход | E - продажа</div>
        </div>
    </div>
    <div class="sidebar">
        <h3>🏪 МАГАЗИН УЛУЧШЕНИЙ</h3>
        <div id="upgradesList"></div>
        <div class="achievement" id="achievements">
            <strong>🏆 ДОСТИЖЕНИЯ</strong>
            <div id="achievementsList"></div>
        </div>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ========== ИГРОВЫЕ ПАРАМЕТРЫ ==========
        let currentLocation = 'farm';
        let money = 2000;
        let totalHarvested = 0;
        let inventory = 0;
        let ownedFieldCount = 2;
        let playerLevel = 1;
        let levelExp = 0;
        
        // Техника
        let currentVehicle = 0;
        let hasTractor = false;
        let hasCombine = false;
        
        // Улучшения
        let upgrades = {
            wateringCan: { level: 0, price: 500, effect: 1.2, name: "💧 Лейка", desc: "+20% скорость роста" },
            fertilizer: { level: 0, price: 800, effect: 1.3, name: "🧪 Удобрения", desc: "+30% урожайность" },
            autoScoop: { level: 0, price: 1200, effect: 1.5, name: "🤖 Автосбор", desc: "+50% шанс двойного сбора" }
        };
        
        // Достижения
        let achievements = {
            firstHarvest: false,
            millionaire: false,
            landOwner: false,
            mechanic: false
        };
        
        // Игрок
        let player = { x: 500, y: 300, radius: 16 };
        
        // ПОЛЯ (прямоугольные)
        let fields = [];
        
        // Точки перехода
        const farmPortal = { x: 950, y: 550, radius: 35 };
        const shopPortal = { x: 50, y: 550, radius: 35 };
        const shopKeeper = { x: 500, y: 300, radius: 45 };
        
        // Система дней/времени
        let dayTime = 0; // 0-100 (утро-вечер)
        let dayCount = 1;
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        function initFields() {
            fields = [];
            fields.push({
                id: 0, x: 280, y: 450, width: 170, height: 115,
                growth: 60, ready: false, lastUpdate: Date.now(), seedType: 'wheat'
            });
            fields.push({
                id: 1, x: 520, y: 430, width: 150, height: 100,
                growth: 40, ready: false, lastUpdate: Date.now(), seedType: 'wheat'
            });
            fields.push({
                id: 2, x: 750, y: 480, width: 140, height: 95,
                growth: 20, ready: false, lastUpdate: Date.now(), seedType: 'wheat'
            });
            ownedFieldCount = 3;
        }
        
        // Добавление поля
        function addNewField() {
            if (money < 1000) {
                alert("Не хватает 1000💰 для покупки поля!");
                return false;
            }
            
            let placed = false;
            let attempts = 0;
            let newX, newY, newW, newH;
            
            while (!placed && attempts < 40) {
                newW = 120 + Math.random() * 80;
                newH = 85 + Math.random() * 60;
                newX = 50 + Math.random() * (canvas.width - newW - 50);
                newY = 50 + Math.random() * (canvas.height - newH - 100);
                
                let ok = true;
                for (let f of fields) {
                    if (Math.abs(f.x - newX) < (f.width/2 + newW/2 + 30)) ok = false;
                    if (Math.abs(f.y - newY) < (f.height/2 + newH/2 + 30)) ok = false;
                }
                if (Math.abs(farmPortal.x - (newX + newW/2)) < 70) ok = false;
                if (ok) placed = true;
                attempts++;
            }
            
            fields.push({
                id: Date.now(), x: newX, y: newY, width: newW, height: newH,
                growth: 0, ready: false, lastUpdate: Date.now(), seedType: 'wheat'
            });
            
            money -= 1000;
            ownedFieldCount++;
            checkAchievements();
            updateUI();
            return true;
        }
        
        // Рост урожая с учётом улучшений
        let lastGrowthTick = Date.now();
        function updateGrowth() {
            if (currentLocation !== 'farm') return;
            
            const now = Date.now();
            const delta = Math.min(0.5, (now - lastGrowthTick) / 1000);
            if (delta < 0.02) return;
            lastGrowthTick = now;
            
            // Смена времени суток
            dayTime = (dayTime + delta * 5) % 100;
            if (dayTime < delta * 5) dayCount++;
            
            for (let field of fields) {
                if (field.growth < 100) {
                    let baseGrowth = 4.5 * delta;
                    // Бонус от лейки
                    if (upgrades.wateringCan.level > 0) {
                        baseGrowth *= (1 + (upgrades.wateringCan.level * 0.15));
                    }
                    field.growth = Math.min(100, field.growth + baseGrowth);
                    if (field.growth >= 100 && !field.ready) {
                        field.ready = true;
                    }
                } else {
                    field.ready = true;
                }
            }
        }
        
        // СБОР УРОЖАЯ с бонусами
        function harvestField(field) {
            if (!field.ready) return false;
            
            let baseAmount = 1;
            if (currentVehicle === 1) baseAmount = 2;
            if (currentVehicle === 2) baseAmount = 4;
            
            // Бонус от удобрений
            let fertBonus = 1 + (upgrades.fertilizer.level * 0.3);
            baseAmount = Math.floor(baseAmount * fertBonus);
            
            // Бонус от количества полей
            baseAmount = Math.floor(baseAmount * (1 + (ownedFieldCount-1) * 0.1));
            
            // Шанс двойного сбора от автосбора
            let autoBonus = 1;
            if (upgrades.autoScoop.level > 0) {
                let chance = upgrades.autoScoop.level * 0.25;
                if (Math.random() < chance) autoBonus = 2;
            }
            
            let harvestAmount = baseAmount * autoBonus;
            
            inventory += harvestAmount;
            totalHarvested += harvestAmount;
            
            // Опыт за сбор
            let expGain = Math.floor(harvestAmount * 2);
            addExperience(expGain);
            
            field.growth = 0;
            field.ready = false;
            field.lastUpdate = Date.now();
            
            checkAchievements();
            updateUI();
            return true;
        }
        
        // Система уровней
        function addExperience(amount) {
            levelExp += amount;
            let expNeeded = playerLevel * 100;
            while (levelExp >= expNeeded) {
                levelExp -= expNeeded;
                playerLevel++;
                money += playerLevel * 100;
                alert(`🎉 УРОВЕНЬ ${playerLevel} ДОСТИГНУТ! 🎉\nПолучено ${playerLevel * 100}💰 бонуса!`);
            }
            updateUI();
        }
        
        // ПРОДАЖА
        function sellHarvest() {
            if (inventory <= 0) {
                alert("🌾 Нет урожая для продажи!");
                return false;
            }
            
            let pricePerUnit = 45;
            if (currentVehicle === 1) pricePerUnit = 60;
            if (currentVehicle === 2) pricePerUnit = 80;
            
            // Бонус за уровень
            pricePerUnit = Math.floor(pricePerUnit * (1 + (playerLevel-1) * 0.05));
            // Бонус за количество полей
            pricePerUnit = Math.floor(pricePerUnit * (1 + (ownedFieldCount-1) * 0.03));
            
            const totalEarn = inventory * pricePerUnit;
            money += totalEarn;
            
            // Анимация сообщения
            showFloatingText(`+${totalEarn}💰`, shopKeeper.x, shopKeeper.y - 40);
            
            inventory = 0;
            checkAchievements();
            updateUI();
            return true;
        }
        
        // Покупка улучшения
        function buyUpgrade(upgradeId) {
            let up = upgrades[upgradeId];
            if (!up) return;
            
            let cost = up.price * (up.level + 1);
            if (money >= cost) {
                money -= cost;
                up.level++;
                updateUI();
                alert(`✨ ${up.name} улучшен до ${up.level} уровня! ✨\n${up.desc}`);
                renderUpgrades();
            } else {
                alert(`Не хватает ${cost}💰 для улучшения!`);
            }
        }
        
        // Покупка техники
        function buyTractor() {
            if (!hasTractor && money >= 1800) {
                hasTractor = true;
                money -= 1800;
                updateUI();
                alert("🚜 Трактор куплен! Собирает x2 урожая, быстрее передвижение!");
                checkAchievements();
                return true;
            } else if (hasTractor) {
                alert("У вас уже есть трактор!");
                return false;
            } else {
                alert("Нужно 1800💰!");
                return false;
            }
        }
        
        function buyCombine() {
            if (!hasCombine && money >= 5000) {
                hasCombine = true;
                money -= 5000;
                updateUI();
                alert("🌾 КОМБАЙН! Собирает x4 урожая, максимальная скорость, +20% к цене продажи!");
                checkAchievements();
                return true;
            } else if (hasCombine) {
                alert("Комбайн уже ваш!");
                return false;
            } else {
                alert("Нужно 5000💰!");
                return false;
            }
        }
        
        // Проверка достижений
        function checkAchievements() {
            let newAchieve = false;
            if (!achievements.firstHarvest && totalHarvested >= 10) {
                achievements.firstHarvest = true;
                money += 500;
                newAchieve = true;
                showFloatingText("🏆 Достижение: Первый урожай! +500💰", 500, 200);
            }
            if (!achievements.millionaire && money >= 10000) {
                achievements.millionaire = true;
                money += 2000;
                newAchieve = true;
                showFloatingText("🏆 Достижение: Миллионер! +2000💰", 500, 200);
            }
            if (!achievements.landOwner && ownedFieldCount >= 6) {
                achievements.landOwner = true;
                money += 1500;
                newAchieve = true;
                showFloatingText("🏆 Достижение: Землевладелец! +1500💰", 500, 200);
            }
            if (!achievements.mechanic && hasTractor && hasCombine) {
                achievements.mechanic = true;
                money += 1000;
                newAchieve = true;
                showFloatingText("🏆 Достижение: Механик! +1000💰", 500, 200);
            }
            if (newAchieve) updateUI();
            renderAchievements();
        }
        
        // Всплывающий текст
        let floatingTexts = [];
        function showFloatingText(text, x, y) {
            floatingTexts.push({ text, x, y, life: 1.0 });
        }
        
        // Смена локации
        function changeLocation() {
            if (currentLocation === 'farm') {
                if (Math.hypot(player.x - farmPortal.x, player.y - farmPortal.y) < (player.radius + farmPortal.radius)) {
                    currentLocation = 'shop';
                    player.x = shopPortal.x;
                    player.y = shopPortal.y - 20;
                    document.getElementById("locationDisplay").innerHTML = "🏪 МАГАЗИН";
                    updateUI();
                } else {
                    alert("Подойдите к золотой звезде (правый нижний угол)!");
                }
            } else {
                if (Math.hypot(player.x - shopPortal.x, player.y - shopPortal.y) < (player.radius + shopPortal.radius)) {
                    currentLocation = 'farm';
                    player.x = farmPortal.x;
                    player.y = farmPortal.y - 20;
                    document.getElementById("locationDisplay").innerHTML = "🌾 ФЕРМА";
                    updateUI();
                } else {
                    alert("Подойдите к зеленой звезде (левый нижний угол)!");
                }
            }
        }
        
        // Сесть/выйти из техники
        function tryEnterVehicle() {
            if (currentLocation !== 'farm') {
                alert("Техника только на ферме!");
                return;
            }
            
            if (currentVehicle !== 0) {
                currentVehicle = 0;
                player.radius = 16;
                updateUI();
                document.getElementById("vehicleStatusMsg").innerHTML = "▶ Пешком";
                return;
            }
            
            const tractorPos = { x: 100, y: 550 };
            const combinePos = { x: 900, y: 550 };
            
            if (hasTractor && Math.hypot(player.x - tractorPos.x, player.y - tractorPos.y) < 45) {
                currentVehicle = 1;
                player.radius = 22;
                document.getElementById("vehicleStatusMsg").innerHTML = "🚜 ТРАКТОР";
            } else if (hasCombine && Math.hypot(player.x - combinePos.x, player.y - combinePos.y) < 50) {
                currentVehicle = 2;
                player.radius = 27;
                document.getElementById("vehicleStatusMsg").innerHTML = "🌾 КОМБАЙН";
            } else {
                alert("Подойдите к технике! 🚜 слева внизу, 🌾 справа внизу");
            }
            updateUI();
        }
        
        // Движение
        let keys = {};
        function calcSpeed() {
            if (currentVehicle === 0) return 240;
            if (currentVehicle === 1) return 380;
            return 550;
        }
        
        function updateMovement(deltaSec) {
            let spd = calcSpeed() * deltaSec;
            let dx = 0, dy = 0;
            if (keys['ArrowUp'] || keys['w']) dy -= 1;
            if (keys['ArrowDown'] || keys['s']) dy += 1;
            if (keys['ArrowLeft'] || keys['a']) dx -= 1;
            if (keys['ArrowRight'] || keys['d']) dx += 1;
            
            if (dx !== 0 || dy !== 0) {
                const len = Math.hypot(dx, dy);
                dx = dx/len * spd;
                dy = dy/len * spd;
            }
            
            let newX = player.x + dx;
            let newY = player.y + dy;
            const margin = player.radius + 5;
            newX = Math.min(Math.max(newX, margin), canvas.width - margin);
            newY = Math.min(Math.max(newY, margin), canvas.height - margin);
            player.x = newX;
            player.y = newY;
            
            // Сбор урожая
            if (currentLocation === 'farm') {
                for (let field of fields) {
                    const left = field.x - field.width/2;
                    const right = field.x + field.width/2;
                    const top = field.y - field.height/2;
                    const bottom = field.y + field.height/2;
                    
                    if (player.x + player.radius > left && player.x - player.radius < right &&
                        player.y + player.radius > top && player.y - player.radius < bottom && field.ready) {
                        harvestField(field);
                        break;
                    }
                }
            }
            
            // Обновление всплывающих текстов
            for (let i = 0; i < floatingTexts.length; i++) {
                floatingTexts[i].life -= deltaSec * 2;
                floatingTexts[i].y -= deltaSec * 40;
            }
            floatingTexts = floatingTexts.filter(t => t.life > 0);
        }
        
        // Отрисовка
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Небо/время суток
            let skyColor = `rgba(100, 150, 200, ${0.3 + Math.sin(dayTime * 0.03) * 0.2})`;
            ctx.fillStyle = "#5f8b4c";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (currentLocation === 'farm') drawFarm();
            else drawShop();
            
            // Всплывающие тексты
            for (let t of floatingTexts) {
                ctx.font = "bold 20px 'Segoe UI'";
                ctx.fillStyle = `rgba(255, 200, 100, ${t.life})`;
                ctx.shadowBlur = 3;
                ctx.fillText(t.text, t.x - 30, t.y - t.life * 20);
            }
            ctx.shadowBlur = 0;
        }
        
        function drawFarm() {
            // Поля
            for (let field of fields) {
                const left = field.x - field.width/2;
                const top = field.y - field.height/2;
                
                let color = field.ready ? "#d4e67a" : "#b9d48b";
                ctx.fillStyle = color;
                ctx.fillRect(left, top, field.width, field.height);
                ctx.strokeStyle = "#4a6730";
                ctx.lineWidth = 2;
                ctx.strokeRect(left, top, field.width, field.height);
                
                ctx.font = "bold 14px 'Segoe UI'";
                ctx.fillStyle = "#2c2b1a";
                ctx.fillText(`${Math.floor(field.growth)}%`, field.x - 20, field.y - field.height/2 - 5);
                
                if (field.ready) {
                    ctx.font = "20px sans-serif";
                    ctx.fillStyle = "#ffaa44";
                    ctx.fillText("🌾", field.x - 12, field.y - 12);
                }
                
                // Пшеница
                ctx.fillStyle = "#e3b138";
                for(let i = 0; i < 8; i++) {
                    let xOff = (Math.sin(i * 1.2) * 12);
                    let yOff = (Math.cos(i * 0.9) * 8);
                    ctx.fillRect(field.x + xOff - 2, field.y + yOff - 2, 2, 6);
                }
            }
            
            // Техника
            if (hasTractor) {
                ctx.fillStyle = "#c95a2a";
                ctx.beginPath();
                ctx.ellipse(100, 550, 24, 30, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.font = "28px sans-serif";
                ctx.fillStyle = "white";
                ctx.fillText("🚜", 88, 548);
                ctx.fillStyle = "#fbe69e";
                ctx.font = "bold 10px";
                ctx.fillText("ТРАКТОР", 70, 530);
            }
            if (hasCombine) {
                ctx.fillStyle = "#c98a2e";
                ctx.beginPath();
                ctx.ellipse(900, 550, 30, 34, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.font = "30px sans-serif";
                ctx.fillStyle = "white";
                ctx.fillText("🌾", 887, 548);
                ctx.fillStyle = "#ffefb9";
                ctx.fillText("КОМБАЙН", 872, 526);
            }
            
            // Портал
            ctx.fillStyle = "#ffcc44";
            ctx.beginPath();
            ctx.arc(farmPortal.x, farmPortal.y, farmPortal.radius, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#b8860b";
            ctx.font = "20px sans-serif";
            ctx.fillText("🌟", farmPortal.x-10, farmPortal.y+8);
            ctx.fillStyle = "#ffef99";
            ctx.font = "10px monospace";
            ctx.fillText("В МАГАЗИН", farmPortal.x-38, farmPortal.y-12);
            
            drawPlayer();
            
            ctx.font = "bold 12px monospace";
            ctx.fillStyle = "#faf0cf";
            ctx.fillText(`🌾 Полей: ${ownedFieldCount}`, 15, 30);
            ctx.fillText(`⭐ Уровень ${playerLevel}`, 15, 55);
            let timeStr = dayTime < 33 ? "☀️ Утро" : (dayTime < 66 ? "🌤 День" : "🌙 Вечер");
            ctx.fillText(`${timeStr} | День ${dayCount}`, 15, 80);
        }
        
        function drawShop() {
            ctx.fillStyle = "#c9ae7a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Пол
            ctx.fillStyle = "#b38f5a";
            for(let i = 0; i < 30; i++) ctx.fillRect(0, i*60, canvas.width, 2);
            
            // Прилавок
            ctx.fillStyle = "#8b5a2b";
            ctx.fillRect(350, 200, 300, 120);
            ctx.fillStyle = "#c97e3a";
            ctx.fillRect(360, 210, 280, 100);
            
            // Продавец
            ctx.fillStyle = "#4a6e8a";
            ctx.beginPath();
            ctx.arc(shopKeeper.x, shopKeeper.y, 28, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#f5deb3";
            ctx.beginPath();
            ctx.arc(shopKeeper.x-8, shopKeeper.y-8, 6, 0, Math.PI*2);
            ctx.fill();
            ctx.font = "32px sans-serif";
            ctx.fillStyle = "#ffffff";
            ctx.fillText("👨‍🌾", shopKeeper.x-18, shopKeeper.y-6);
            
            // Вывеска
            ctx.fillStyle = "#f5c542";
            ctx.fillRect(380, 130, 240, 45);
            ctx.fillStyle = "#8b4513";
            ctx.font = "bold 26px 'Segoe UI'";
            ctx.fillText("🏪 МАГАЗИН", 420, 165);
            
            // Инфо о ценах
            ctx.fillStyle = "#2c2b1a";
            ctx.font = "bold 16px monospace";
            ctx.fillText("ПРИЕМ УРОЖАЯ", 430, 270);
            ctx.font = "12px monospace";
            ctx.fillStyle = "#1e2a1c";
            let price = 45 + (currentVehicle === 1 ? 15 : 0) + (currentVehicle === 2 ? 35 : 0);
            price = Math.floor(price * (1 + (playerLevel-1) * 0.05));
            ctx.fillText(`Текущая цена: ${price}💰/ед`, 440, 305);
            
            // Портал назад
            ctx.fillStyle = "#44cc88";
            ctx.beginPath();
            ctx.arc(shopPortal.x, shopPortal.y, shopPortal.radius, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#2c6e3a";
            ctx.font = "20px sans-serif";
            ctx.fillText("🌾", shopPortal.x-8, shopPortal.y+6);
            ctx.fillStyle = "#cfffc0";
            ctx.font = "10px monospace";
            ctx.fillText("НА ФЕРМУ", shopPortal.x-38, shopPortal.y-12);
            
            drawPlayer();
            
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = "#ffdd99";
            ctx.fillText("💡 Нажми E рядом с продавцом!", 380, 470);
            
            if (inventory > 0) {
                ctx.fillStyle = "#ffaa33";
                ctx.font = "bold 22px sans-serif";
                ctx.fillText(`📦 ${inventory} ед.`, 450, 540);
            }
        }
        
        function drawPlayer() {
            if (currentVehicle === 0) {
                ctx.fillStyle = "#5a7cb0";
                ctx.beginPath();
                ctx.arc(player.x, player.y, 14, 0, Math.PI*2);
                ctx.fill();
                ctx.font = "24px sans-serif";
                ctx.fillStyle = "#ffeeca";
                ctx.fillText("🧑", player.x-10, player.y-7);
            } else if (currentVehicle === 1) {
                ctx.fillStyle = "#d9682a";
                ctx.beginPath();
                ctx.ellipse(player.x, player.y, 21, 26, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.font = "28px sans-serif";
                ctx.fillText("🚜", player.x-14, player.y+9);
            } else {
                ctx.fillStyle = "#d99e3a";
                ctx.beginPath();
                ctx.ellipse(player.x, player.y, 26, 30, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.font = "32px sans-serif";
                ctx.fillText("🌾", player.x-17, player.y+9);
            }
        }
        
        function renderUpgrades() {
            let html = '';
            for (let [id, up] of Object.entries(upgrades)) {
                let cost = up.price * (up.level + 1);
                html += `
                    <div class="upgrade-item" onclick="window.buyUpgrade('${id}')">
                        <div>
                            <strong>${up.name}</strong> Lv.${up.level}<br>
                            <small>${up.desc}</small>
                        </div>
                        <div class="price-tag">${cost}💰</div>
                    </div>
                `;
            }
            document.getElementById('upgradesList').innerHTML = html;
        }
        
        function renderAchievements() {
            let html = '';
            if (achievements.firstHarvest) html += '✓ Первый урожай (+500💰)<br>';
            if (achievements.millionaire) html += '✓ Миллионер (+2000💰)<br>';
            if (achievements.landOwner) html += '✓ Землевладелец (+1500💰)<br>';
            if (achievements.mechanic) html += '✓ Механик (+1000💰)<br>';
            if (html === '') html = '🌀 Выполняйте задания!';
            document.getElementById('achievementsList').innerHTML = html;
        }
        
        function updateUI() {
            document.getElementById("money").innerText = Math.floor(money);
            document.getElementById("level").innerText = playerLevel;
            document.getElementById("inventoryCount").innerText = inventory;
            let vehicleText = currentVehicle === 0 ? "Пешком" : (currentVehicle === 1 ? "Трактор" : "Комбайн");
            document.getElementById("vehicleName").innerText = vehicleText;
            document.getElementById("vehicleStatusMsg").innerHTML = currentVehicle === 0 ? "▶ Пешком" : (currentVehicle === 1 ? "🚜 ТРАКТОР" : "🌾 КОМБАЙН");
        }
        
        function handleSell() {
            if (currentLocation === 'shop') {
                if (Math.hypot(player.x - shopKeeper.x, player.y - shopKeeper.y) < 70) {
                    sellHarvest();
                } else {
                    alert("Подойдите ближе к продавцу!");
                }
            } else {
                alert("Продажа только в магазине! Перейдите через звезду (Enter)");
            }
        }
        
        // Обработка клавиш
        function handleKeyDown(e) {
            const key = e.key;
            const moveKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 's', 'a', 'd'];
            if (moveKeys.includes(key)) {
                e.preventDefault();
                keys[key] = true;
            }
            if (key === ' ' || key === 'Space') {
                e.preventDefault();
                tryEnterVehicle();
            }
            if (key === 'e' || key === 'E') {
                e.preventDefault();
                handleSell();
            }
            if (key === 'Enter') {
                e.preventDefault();
                changeLocation();
            }
        }
        
        function handleKeyUp(e) {
            const key = e.key;
            delete keys[key];
        }
        
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            tryEnterVehicle();
        });
        
        window.buyUpgrade = buyUpgrade;
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        
        document.getElementById("buyTractorBtn")?.addEventListener("click", () => { buyTractor(); updateUI(); });
        document.getElementById("buyCombineBtn")?.addEventListener("click", () => { buyCombine(); updateUI(); });
        document.getElementById("buyLandBtn")?.addEventListener("click", () => { addNewField(); updateUI(); });
        
        // Добавляем кнопки в DOM
        const shopDiv = document.querySelector('.shop-buttons');
        if (shopDiv) {
            shopDiv.innerHTML = `
                <button id="buyTractorBtn">🚜 Трактор (1800💰)</button>
                <button id="buyCombineBtn">🌾 Комбайн (5000💰)</button>
                <button id="buyLandBtn">🌱 Купить поле (1000💰)</button>
            `;
            document.getElementById("buyTractorBtn").addEventListener("click", () => { buyTractor(); updateUI(); });
            document.getElementById("buyCombineBtn").addEventListener("click", () => { buyCombine(); updateUI(); });
            document.getElementById("buyLandBtn").addEventListener("click", () => { addNewField(); updateUI(); });
        }
        
        initFields();
        renderUpgrades();
        renderAchievements();
        updateUI();
        lastGrowthTick = Date.now();
        
        function gameLoop() {
            let now = performance.now();
            let delta = Math.min(0.033, (now - (lastFrame || now)) / 1000);
            if (delta > 0.001) {
                updateGrowth();
                updateMovement(delta);
                draw();
            }
            lastFrame = now;
            requestAnimationFrame(gameLoop);
        }
        
        let lastFrame = performance.now();
        gameLoop();
    })();
</script>
</body>
</html>
