<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Фермерская жизнь - Собирай урожай и вези в магазин!</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: #2b5e2f;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,255,0.2);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            cursor: crosshair;
            background-color: #3c8c40;
        }

        .ui-panel {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            background: #fef3c7;
            padding: 12px 24px;
            border-radius: 60px;
            background: #2c3e2b;
            backdrop-filter: blur(4px);
            box-shadow: inset 0 1px 3px #5f8b4c, 0 8px 15px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            gap: 28px;
            background: #1e2a1c;
            padding: 8px 20px;
            border-radius: 40px;
            color: #ffefb9;
            font-weight: bold;
            text-shadow: 2px 2px 0 #2c4b1e;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.4rem;
            letter-spacing: 1px;
        }

        .stat span:first-child {
            font-size: 1.6rem;
        }

        .inventory {
            background: #4a3e28;
            padding: 5px 18px;
            border-radius: 32px;
            font-weight: bold;
            color: #ffefb9;
            font-size: 1.2rem;
        }

        .shop {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            background: #f5b042;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #8b5a2b;
            color: #2c2b1f;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #8b5a2b;
        }

        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .vehicle-status {
            background: #d9c48b;
            padding: 5px 16px;
            border-radius: 32px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #2a2b1a;
        }

        .controls-info {
            background: #211d10;
            color: #ffefb9;
            border-radius: 28px;
            padding: 5px 15px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        @media (max-width: 900px) {
            .stats .stat { font-size: 1rem; }
            button { padding: 6px 12px; font-size: 0.8rem; }
            .ui-panel { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <div class="ui-panel">
            <div class="stats">
                <div class="stat"><span>💰</span> <span id="money">1500</span></div>
                <div class="stat"><span>🧺</span> <span id="harvestInventory">0</span></div>
                <div class="stat"><span>🚜</span> <span id="vehicleName">Пешком</span></div>
            </div>
            <div class="inventory">
                📦 Урожай в рюкзаке: <span id="inventoryCount">0</span> ед.
            </div>
            <div class="shop">
                <button id="buyTractorBtn">🚜 Купить трактор (1800💰)</button>
                <button id="buyCombineBtn">🌾 Купить комбайн (4500💰)</button>
                <button id="buyLandBtn">🌱 Купить участок (1200💰)</button>
            </div>
            <div class="vehicle-status" id="vehicleStatusMsg">▶ Режим: пешком (WASD)</div>
            <div class="controls-info">🕹️ WASD / стрелки — движение | ПКМ / Пробел — сесть/выйти из техники | 🏪 Езжайте к магазину (красное здание), чтобы продать урожай!</div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- НАСТРОЙКИ МИРА ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Игровые параметры (цены снижены!)
        let money = 1500;           // стартовый капитал
        let totalHarvested = 0;     // всего собрано за всю игру (статистика)
        let inventory = 0;          // урожай в рюкзаке (ждет продажи)
        let ownedLandCount = 1;     // изначально 1 участок
        
        // Техника: 0 - пешком, 1 - трактор, 2 - комбайн
        let currentVehicle = 0;
        let hasTractor = false;
        let hasCombine = false;
        
        // Игрок
        let player = { x: 500, y: 300, radius: 16 };
        
        // Магазин (точка продажи)
        const shop = {
            x: 900,
            y: 80,
            radius: 45,
            name: "МАГАЗИН"
        };
        
        // Участки (поля)
        let plots = [];
        
        // Инициализация полей
        function initPlots() {
            plots = [];
            // Стартовый участок
            plots.push({
                id: 0,
                x: 500, y: 500,
                radius: 52,
                growth: 0,
                ready: false,
                lastUpdate: Date.now()
            });
            // добавим еще один небольшой стартовый участок для разнообразия
            plots.push({
                id: 1,
                x: 250, y: 400,
                radius: 48,
                growth: 25,
                ready: false,
                lastUpdate: Date.now()
            });
            ownedLandCount = 2; // теперь 2 участка
        }
        
        // покупка нового участка (дешевле)
        function addNewLand() {
            if (money < 1200) {
                alert("Не хватает монет! Нужно 1200💰");
                return false;
            }
            let placed = false;
            let attempts = 0;
            let newX, newY;
            while (!placed && attempts < 60) {
                newX = 120 + Math.random() * (canvas.width - 240);
                newY = 100 + Math.random() * (canvas.height - 180);
                let ok = true;
                for (let p of plots) {
                    if (Math.hypot(p.x - newX, p.y - newY) < (p.radius + 70)) {
                        ok = false;
                        break;
                    }
                }
                if (Math.hypot(shop.x - newX, shop.y - newY) < 85) ok = false;
                if (ok && newX > 60 && newX < canvas.width-60 && newY > 60 && newY < canvas.height-60) placed = true;
                attempts++;
            }
            if (!placed) {
                newX = 650 + Math.random() * 200;
                newY = 400 + Math.random() * 150;
            }
            plots.push({
                id: Date.now(),
                x: newX,
                y: newY,
                radius: 50,
                growth: 0,
                ready: false,
                lastUpdate: Date.now()
            });
            money -= 1200;
            ownedLandCount++;
            updateUI();
            return true;
        }
        
        // рост урожая на полях
        let lastGrowthTick = Date.now();
        function updateGrowth() {
            const now = Date.now();
            const delta = Math.min(0.5, (now - lastGrowthTick) / 1000);
            if (delta < 0.03) return;
            lastGrowthTick = now;
            for (let plot of plots) {
                if (plot.growth < 100) {
                    let inc = 3.2 * delta; // скорость роста ~3.2% в секунду, быстрее
                    plot.growth = Math.min(100, plot.growth + inc);
                    if (plot.growth >= 100 && !plot.ready) {
                        plot.ready = true;
                    }
                } else {
                    plot.ready = true;
                }
            }
        }
        
        // СБОР УРОЖАЯ - добавляет в инвентарь, а не сразу в деньги!
        function harvestPlot(plot) {
            if (!plot.ready) return false;
            
            // количество урожая с одного поля
            let harvestAmount = 1;
            if (currentVehicle === 1) harvestAmount = 2;      // трактор собирает 2 единицы
            if (currentVehicle === 2) harvestAmount = 4;      // комбайн собирает 4 единицы
            
            // бонус за количество участков
            harvestAmount = Math.floor(harvestAmount * (1 + (ownedLandCount-1) * 0.1));
            
            inventory += harvestAmount;
            totalHarvested += harvestAmount;
            
            // поле обнуляется и начинает расти заново
            plot.growth = 0;
            plot.ready = false;
            plot.lastUpdate = Date.now();
            
            updateUI();
            
            // визуальный эффект
            return true;
        }
        
        // ПРОДАЖА УРОЖАЯ в магазине
        function sellHarvest() {
            if (inventory <= 0) {
                alert("У вас нет урожая для продажи! Сначала соберите урожай с полей.");
                return false;
            }
            
            // цена за единицу зависит от техники, на которой вы приехали (премия за логистику)
            let pricePerUnit = 45; // базовая цена
            if (currentVehicle === 1) pricePerUnit = 58;  // трактор лучше везет
            if (currentVehicle === 2) pricePerUnit = 75;  // комбайн привозит премиальный урожай
            
            // доп бонус за количество участков
            pricePerUnit = Math.floor(pricePerUnit * (1 + (ownedLandCount-1) * 0.05));
            
            const totalEarn = inventory * pricePerUnit;
            money += totalEarn;
            
            // показать сообщение о продаже
            alert(`🏪 ПРОДАЖА! Вы продали ${inventory} ед. урожая по ${pricePerUnit}💰 = ${totalEarn}💰\nБаланс: ${money}💰`);
            
            inventory = 0;
            updateUI();
            return true;
        }
        
        // покупка техники (дешевле)
        function buyTractor() {
            if (!hasTractor && money >= 1800) {
                hasTractor = true;
                money -= 1800;
                updateUI();
                alert("🚜 Трактор куплен! Подойдите к нему (слева внизу) и нажмите Пробел или ПКМ, чтобы сесть. Собирает в 2 раза больше урожая!");
                return true;
            } else if (hasTractor) {
                alert("У вас уже есть трактор!");
                return false;
            } else {
                alert("Не хватает 1800💰! Заработайте на продаже урожая.");
                return false;
            }
        }
        
        function buyCombine() {
            if (!hasCombine && money >= 4500) {
                hasCombine = true;
                money -= 4500;
                updateUI();
                alert("🌾 Мощный комбайн! Находится справа внизу. Садитесь - собирает 4 урожая за раз, дороже продает!");
                return true;
            } else if (hasCombine) {
                alert("Комбайн уже ваш!");
                return false;
            } else {
                alert("Нужно 4500💰! Продолжайте торговать.");
                return false;
            }
        }
        
        // сесть в технику
        function tryEnterVehicle() {
            if (currentVehicle !== 0) {
                // выйти из техники
                currentVehicle = 0;
                player.radius = 16;
                updateUI();
                document.getElementById("vehicleStatusMsg").innerHTML = "▶ Режим: пешком (WASD)";
                return;
            }
            // позиции техники
            const tractorPos = { x: 120, y: 550 };
            const combinePos = { x: 880, y: 550 };
            
            let nearTractor = hasTractor && Math.hypot(player.x - tractorPos.x, player.y - tractorPos.y) < 42;
            let nearCombine = hasCombine && Math.hypot(player.x - combinePos.x, player.y - combinePos.y) < 48;
            
            if (nearTractor) {
                currentVehicle = 1;
                player.radius = 22;
                document.getElementById("vehicleStatusMsg").innerHTML = "🚜 Режим: ТРАКТОР (скорость +, урожай x2)";
                updateUI();
            } else if (nearCombine) {
                currentVehicle = 2;
                player.radius = 27;
                document.getElementById("vehicleStatusMsg").innerHTML = "🌾 Режим: КОМБАЙН (скорость ++, урожай x4, цена продажи выше)";
                updateUI();
            } else {
                alert("Подойдите к купленной технике! 🚜 Трактор (слева внизу) 🌾 Комбайн (справа внизу)");
            }
        }
        
        // движение
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, s: false, a: false, d: false };
        function calcSpeed() {
            if (currentVehicle === 0) return 210;
            if (currentVehicle === 1) return 340;
            return 500;
        }
        
        let lastFrameTime = performance.now();
        function updateMovement(deltaSec) {
            let spd = calcSpeed() * deltaSec;
            let dx = 0, dy = 0;
            if (keys.ArrowUp || keys.w) dy -= 1;
            if (keys.ArrowDown || keys.s) dy += 1;
            if (keys.ArrowLeft || keys.a) dx -= 1;
            if (keys.ArrowRight || keys.d) dx += 1;
            if (dx !== 0 || dy !== 0) {
                const len = Math.hypot(dx, dy);
                dx = dx/len * spd;
                dy = dy/len * spd;
            }
            let newX = player.x + dx;
            let newY = player.y + dy;
            const margin = player.radius + 5;
            newX = Math.min(Math.max(newX, margin), canvas.width - margin);
            newY = Math.min(Math.max(newY, margin), canvas.height - margin);
            player.x = newX;
            player.y = newY;
            
            // СБОР УРОЖАЯ при касании готового поля
            for (let plot of plots) {
                const dist = Math.hypot(player.x - plot.x, player.y - plot.y);
                if (dist < (player.radius + plot.radius) && plot.ready) {
                    harvestPlot(plot);
                    break; // один сбор за кадр
                }
            }
            
            // ПРОВЕРКА ПРОДАЖИ в магазине (если игрок рядом с магазином и нажата клавиша E)
            // добавим автоматическое всплывающее окно? но лучше сделать кнопку в интерфейсе, но в описании механика "ехать в магазин"
            // для удобства сделаем триггер: если игрок в радиусе магазина, появляется кнопка или авто-продажа? 
            // Поскольку кнопка уже есть в интерфейсе, но для погружения добавим проверку на proximity и предложение.
        }
        
        // проверка нахождения в магазине для визуального индикатора
        function isNearShop() {
            return Math.hypot(player.x - shop.x, player.y - shop.y) < (player.radius + shop.radius + 15);
        }
        
        // Отрисовка всего
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // фон
            ctx.fillStyle = "#5f8b4c";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for(let i=0;i<150;i++) {
                ctx.fillStyle = "#7ca55a";
                ctx.beginPath();
                ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 2, 0, Math.PI*2);
                ctx.fill();
            }
            
            // рисуем участки
            for (let plot of plots) {
                const grad = ctx.createRadialGradient(plot.x-8, plot.y-8, 8, plot.x, plot.y, plot.radius);
                grad.addColorStop(0, "#c7e29c");
                grad.addColorStop(1, "#7fa545");
                ctx.beginPath();
                ctx.arc(plot.x, plot.y, plot.radius, 0, Math.PI*2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = "#4a6730";
                ctx.lineWidth = 2.5;
                ctx.stroke();
                // прогресс роста
                ctx.font = "bold 16px 'Segoe UI'";
                ctx.fillStyle = "#2c2b1a";
                ctx.fillText(`${Math.floor(plot.growth)}%`, plot.x-20, plot.y-28);
                if (plot.ready) {
                    ctx.font = "bold 18px sans-serif";
                    ctx.fillStyle = "#ffd966";
                    ctx.shadowBlur = 3;
                    ctx.fillText("🌾 СОЗРЕЛО!", plot.x-48, plot.y+5);
                    ctx.shadowBlur = 0;
                }
                // рисуем пшеницу
                ctx.fillStyle = "#e3b138";
                for(let ang=0; ang<Math.PI*2; ang+=0.9){
                    let xOff = Math.cos(ang)*12;
                    let yOff = Math.sin(ang)*7;
                    ctx.fillRect(plot.x+xOff-2, plot.y+yOff-2, 3, 6);
                }
            }
            
            // МАГАЗИН (яркое здание)
            ctx.fillStyle = "#b53b2a";
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.rect(shop.x-42, shop.y-38, 84, 70);
            ctx.fill();
            ctx.fillStyle = "#ffdd99";
            ctx.beginPath();
            ctx.rect(shop.x-28, shop.y-18, 56, 35);
            ctx.fill();
            ctx.fillStyle = "#8b2c1a";
            ctx.font = "bold 24px monospace";
            ctx.fillText("🏪", shop.x-15, shop.y+8);
            ctx.fillStyle = "white";
            ctx.font = "bold 14px 'Segoe UI'";
            ctx.fillText("МАГАЗИН", shop.x-35, shop.y-20);
            ctx.fillStyle = "#ffefb0";
            ctx.font = "12px monospace";
            ctx.fillText("Продажа", shop.x-23, shop.y+24);
            if (isNearShop()) {
                ctx.fillStyle = "gold";
                ctx.font = "bold 16px sans-serif";
                ctx.fillText("⚡ НАЖМИТЕ 'E' ДЛЯ ПРОДАЖИ ⚡", shop.x-125, shop.y-45);
            }
            
            // техника на карте
            if (hasTractor) {
                ctx.fillStyle = "#c95a2a";
                ctx.beginPath();
                ctx.ellipse(120, 550, 24, 30, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#a5522a";
                ctx.fillRect(105, 537, 30, 20);
                ctx.fillStyle = "white";
                ctx.font = "28px sans-serif";
                ctx.fillText("🚜", 108, 548);
                ctx.fillStyle = "#fbe69e";
                ctx.font = "bold 12px";
                ctx.fillText("ТРАКТОР", 90, 530);
            }
            if (hasCombine) {
                ctx.fillStyle = "#c98a2e";
                ctx.beginPath();
                ctx.ellipse(880, 550, 30, 34, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#8b5a2a";
                ctx.fillRect(857, 536, 46, 26);
                ctx.fillStyle = "white";
                ctx.font = "30px sans-serif";
                ctx.fillText("🌾", 867, 548);
                ctx.fillStyle = "#ffefb9";
                ctx.font = "bold 11px";
                ctx.fillText("КОМБАЙН", 852, 526);
            }
            
            // игрок
            ctx.shadowBlur = 4;
            if (currentVehicle === 0) {
                ctx.fillStyle = "#5a7cb0";
                ctx.beginPath();
                ctx.arc(player.x, player.y, 14, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#f9e0a0";
                ctx.beginPath();
                ctx.arc(player.x-3, player.y-4, 3.5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#3a2e1a";
                ctx.fillRect(player.x-8, player.y+4, 16, 8);
                ctx.font = "24px sans-serif";
                ctx.fillStyle = "#ffeeca";
                ctx.fillText("🧑", player.x-10, player.y-7);
            } else if (currentVehicle === 1) {
                ctx.fillStyle = "#d9682a";
                ctx.beginPath();
                ctx.ellipse(player.x, player.y, 21, 26, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#bc6b2a";
                ctx.fillRect(player.x-17, player.y-6, 34, 14);
                ctx.font = "28px sans-serif";
                ctx.fillStyle = "black";
                ctx.fillText("🚜", player.x-14, player.y+9);
            } else {
                ctx.fillStyle = "#d99e3a";
                ctx.beginPath();
                ctx.ellipse(player.x, player.y, 26, 30, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#bd7a2a";
                ctx.fillRect(player.x-20, player.y-4, 40, 14);
                ctx.font = "32px sans-serif";
                ctx.fillText("🌾", player.x-17, player.y+9);
            }
            ctx.shadowBlur = 0;
            // инфо на экране
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = "#faf0cf";
            ctx.fillText(`Участков: ${ownedLandCount}`, 20, 35);
            if (inventory > 0) {
                ctx.fillStyle = "#ffd966";
                ctx.font = "bold 20px monospace";
                ctx.fillText(`📦 В рюкзаке: ${inventory}`, 20, 75);
            }
        }
        
        // UI обновление
        function updateUI() {
            document.getElementById("money").innerText = Math.floor(money);
            document.getElementById("harvestInventory").innerText = totalHarvested;
            document.getElementById("inventoryCount").innerText = inventory;
            let vehicleText = currentVehicle === 0 ? "Пешком" : (currentVehicle === 1 ? "Трактор" : "Комбайн");
            document.getElementById("vehicleName").innerText = vehicleText;
            const buyTractorBtn = document.getElementById("buyTractorBtn");
            const buyCombineBtn = document.getElementById("buyCombineBtn");
            const buyLandBtn = document.getElementById("buyLandBtn");
            buyTractorBtn.disabled = hasTractor || money < 1800;
            buyCombineBtn.disabled = hasCombine || money < 4500;
            buyLandBtn.disabled = money < 1200;
        }
        
        // обработка продажи по клавише E
        function handleSellKey() {
            if (isNearShop() && inventory > 0) {
                sellHarvest();
            } else if (isNearShop() && inventory === 0) {
                alert("В рюкзаке нет урожая! Соберите урожай с полей и приходите снова.");
            } else if (!isNearShop()) {
                // можно не спамить, просто игнорим
            }
        }
        
        // игровой цикл
        let lastUpdateTime = performance.now();
        function gameLoop(now) {
            let delta = Math.min(0.033, (now - lastUpdateTime) / 1000);
            if (delta > 0.001) {
                updateGrowth();
                updateMovement(delta);
                draw();
            }
            lastUpdateTime = now;
            requestAnimationFrame(gameLoop);
        }
        
        // обработка клавиш
        function handleKeyDown(e) {
            const key = e.key;
            const moveKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 's', 'a', 'd'];
            if (moveKeys.includes(key)) {
                e.preventDefault();
                if (key === 'ArrowUp') keys.ArrowUp = true;
                if (key === 'ArrowDown') keys.ArrowDown = true;
                if (key === 'ArrowLeft') keys.ArrowLeft = true;
                if (key === 'ArrowRight') keys.ArrowRight = true;
                if (key === 'w') keys.w = true;
                if (key === 's') keys.s = true;
                if (key === 'a') keys.a = true;
                if (key === 'd') keys.d = true;
            }
            if (key === ' ' || key === 'Space') {
                e.preventDefault();
                tryEnterVehicle();
            }
            if (key === 'e' || key === 'E') {
                e.preventDefault();
                handleSellKey();
            }
        }
        
        function handleKeyUp(e) {
            const key = e.key;
            if (key === 'ArrowUp') keys.ArrowUp = false;
            if (key === 'ArrowDown') keys.ArrowDown = false;
            if (key === 'ArrowLeft') keys.ArrowLeft = false;
            if (key === 'ArrowRight') keys.ArrowRight = false;
            if (key === 'w') keys.w = false;
            if (key === 's') keys.s = false;
            if (key === 'a') keys.a = false;
            if (key === 'd') keys.d = false;
        }
        
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            tryEnterVehicle();
            return false;
        });
        
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        
        // кнопки магазина
        document.getElementById("buyTractorBtn").addEventListener("click", () => { buyTractor(); updateUI(); });
        document.getElementById("buyCombineBtn").addEventListener("click", () => { buyCombine(); updateUI(); });
        document.getElementById("buyLandBtn").addEventListener("click", () => { addNewLand(); updateUI(); });
        
        initPlots();
        updateUI();
        lastGrowthTick = Date.now();
        lastUpdateTime = performance.now();
        requestAnimationFrame(gameLoop);
    })();
</script>
</body>
</html>
